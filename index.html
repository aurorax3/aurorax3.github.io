function loadWorkoutLog() {
  const phase = phaseForWeek(state.settings.week);
  const dayName = PROGRAMS[state.settings.split].phases[phase][state.dayIndex].day;
  const key = `workout:${todayStr()}:${state.settings.split}:${dayName}`;
  const existing = store.get(key, null);
  if (existing) { state.workoutLog = existing; return; }
  const template = {};
  PROGRAMS[state.settings.split].phases[phase][state.dayIndex].exercises.forEach((e) => {
    template[e.name] = Array.from({ length: e.sets }, () => ({ weight: "", reps: "" }));
  });
  state.workoutLog = template;
}
loadWorkoutLog();

/* ---------------- Tiny SVG line chart (no dependencies) ---------------- */
function svgLineChart(seriesList, { width = 300, height = 140, labels }) {
  const pad = { top: 10, right: 8, bottom: 20, left: 30 };
  const w = width - pad.left - pad.right;
  const h = height - pad.top - pad.bottom;
  let allVals = [];
  seriesList.forEach((s) => s.data.forEach((v) => { if (v !== null && v !== undefined) allVals.push(v); }));
  if (allVals.length === 0) allVals = [0, 1];
  let min = Math.min(...allVals), max = Math.max(...allVals);
  if (min === max) { min -= 1; max += 1; }
  const range = max - min;
  const n = labels.length;
  const xFor = (i) => pad.left + (n === 1 ? 0 : (i / (n - 1)) * w);
  const yFor = (v) => pad.top + h - ((v - min) / range) * h;

  let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}">`;
  // gridlines
  for (let gy = 0; gy <= 2; gy++) {
    const y = pad.top + (gy / 2) * h;
    svg += `<line x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}" stroke="#292524" stroke-width="1" />`;
  }
  seriesList.forEach((s) => {
    let points = [];
    let path = "";
    s.data.forEach((v, i) => {
      if (v === null || v === undefined) return;
      const x = xFor(i), y = yFor(v);
      path += (points.length === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
      points.push([x, y]);
    });
    if (path) svg += `<path d="${path}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />`;
    points.forEach(([x, y]) => { if (s.dots) svg += `<circle cx="${x}" cy="${y}" r="2.5" fill="${s.color}" />`; });
  });
  // x labels (every 3rd)
  labels.forEach((lab, i) => {
    if (i % 3 !== 0 && i !== n - 1) return;
    svg += `<text x="${xFor(i)}" y="${height - 4}" font-size="9" fill="#78716c" text-anchor="middle">${lab}</text>`;
  });
  // y labels
  svg += `<text x="${pad.left - 4}" y="${pad.top + 4}" font-size="9" fill="#78716c" text-anchor="end">${Math.round(max)}</text>`;
  svg += `<text x="${pad.left - 4}" y="${height - pad.bottom}" font-size="9" fill="#78716c" text-anchor="end">${Math.round(min)}</text>`;
  svg += `</svg>`;
  return svg;
}

  beef: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12.5" cy="8.5" r="6.5"/><path d="M9 19.5c-1.5 1-3.5 1-5-1"/><path d="M4 4c-1.5 1.5-2 3-2 4.5"/></svg>`,
  scale: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 7v5l3 3"/></svg>`,
  dumbbell: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>`,
  trending: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,

  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`,
};

/* ---------------- Render ---------------- */
function render() {
  const app = document.getElementById("app");
  const s = state.settings;

  let html = `
    <header>
      <div>
        <h1>Recomp Log</h1>
        <p>${new Date().toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" })}</p>
      </div>
      <span id="saved-flash">✓ Saved</span>
    </header>
    <main>`;

  if (state.tab === "nutrition") {
    const bw = state.bodyWeightToday;
    html += `
      <section>
        <div class="row-between">
          <span class="label">${ICONS.scale.replace("currentColor","#38bdf8")} Body weight</span>
        </div>
        <div class="row-gap">
          <input type="number" inputmode="decimal" step="0.1" id="bw-input" placeholder="Weight in ${s.weightUnit}" value="${bw}" />
          <button class="btn btn-secondary btn-inline" id="bw-save" style="width:auto;">Log</button>
        </div>
      </section>

      <section>
        <div class="row-between">
          <span class="label">${ICONS.flame.replace("currentColor","#fb923c")} Calories</span>
          <span class="sublabel">${state.nutritionToday.calories || 0} / ${s.calorieTarget} kcal</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${Math.min(100, Math.round(((Number(state.nutritionToday.calories)||0)/s.calorieTarget)*100))}%; background:#fb923c;"></div></div>
        <input type="number" inputmode="numeric" id="cal-input" placeholder="Enter calories eaten today" value="${state.nutritionToday.calories}" />
      </section>

      <section>
        <div class="row-between">
          <span class="label">${ICONS.beef.replace("currentColor","#fb7185")} Protein</span>
          <span class="sublabel">${state.nutritionToday.protein || 0} / ${s.proteinTarget} g</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${Math.min(100, Math.round(((Number(state.nutritionToday.protein)||0)/s.proteinTarget)*100))}%; background:#fb7185;"></div></div>
        <input type="number" inputmode="numeric" id="pro-input" placeholder="Enter grams of protein eaten today" value="${state.nutritionToday.protein}" />
      </section>

      <button class="btn" id="save-nutrition">Save today's intake</button>
    `;
  }

  if (state.tab === "workout") {
    const phase = phaseForWeek(s.week);
    const days = PROGRAMS[s.split].phases[phase];
    const activeDay = days[state.dayIndex];
    html += `
      <div class="row-gap" style="margin-bottom:14px;">
        <select id="split-select">
          ${Object.entries(PROGRAMS).map(([k, v]) => `<option value="${k}" ${k===s.split?"selected":""}>${v.label}</option>`).join("")}
        </select>
        <select id="week-select" style="max-width:110px;">
          ${Array.from({length:8},(_,i)=>i+1).map(w=>`<option value="${w}" ${w===s.week?"selected":""}>Week ${w}</option>`).join("")}
        </select>
      </div>
      <div class="chip-row">
        ${days.map((d,i)=>`<button class="chip ${i===state.dayIndex?"active":""}" data-day="${i}">${d.day}</button>`).join("")}
      </div>
    `;
    activeDay.exercises.forEach((e) => {
      html += `<div class="card">
        <div class="row-between" style="margin-bottom:2px;">
          <h3>${e.name}</h3>
          <span class="meta">RPE ${e.rpe} · rest ${e.rest}</span>
        </div>
        <div class="row-between" style="margin-bottom:6px;">
          <span class="meta">${e.sets} sets × ${e.reps} reps</span>
          ${VIDEO_LINKS[e.name]
            ? `<button class="watch-link video-toggle-btn" data-video-ex="${e.name}" style="background:none;border:none;padding:0;cursor:pointer;">${state.expandedVideos.has(e.name) ? "▲ Hide video" : "▶ Watch Jeff's demo"}</button>`
            : `<a class="watch-link" href="${videoUrlFor(e.name)}" target="_blank" rel="noopener">▶ Watch form</a>`
          }
        </div>
        ${VIDEO_LINKS[e.name] && state.expandedVideos.has(e.name) ? `
        <div class="video-embed-wrap">
          <iframe
            width="100%"
            height="200"
            src="https://www.youtube-nocookie.com/embed/${VIDEO_LINKS[e.name]}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy"
          ></iframe>
        </div>` : ""}`;
      (state.workoutLog[e.name] || []).forEach((set, si) => {
        html += `<div class="set-row">
          <span>Set ${si+1}</span>
          <input type="number" inputmode="decimal" placeholder="${s.weightUnit}" value="${set.weight}" data-ex="${e.name}" data-set="${si}" data-field="weight" class="wt-input" />
          <input type="number" inputmode="numeric" placeholder="reps" value="${set.reps}" data-ex="${e.name}" data-set="${si}" data-field="reps" class="wt-input" />
        </div>`;
      });
      html += `</div>`;
    });
    html += `<button class="btn" id="save-workout">Save workout</button>`;
  }

  if (state.tab === "progress") {
    const bwHist = last14Days().map(d => (store.get(`bodyweight:${d}`, null)||{}).weight ?? null);
    const nutHist = last14Days().map(d => store.get(`nutrition:${d}`, null));
    const labels = last14Days().map(d => d.slice(5));
    const calData = nutHist.map(n => n && n.calories ? Number(n.calories) : null);
    const proData = nutHist.map(n => n && n.protein ? Number(n.protein) : null);

    html += `
      <div style="margin-bottom:20px;">
        <div class="label" style="margin-bottom:10px;">${ICONS.scale.replace("currentColor","#38bdf8")} Body weight (${s.weightUnit})</div>
        <div class="chart-box">${svgLineChart([{data: bwHist, color:"#38bdf8", dots:true}], {labels})}</div>
      </div>
      <div>
        <div class="label" style="margin-bottom:10px;">${ICONS.trending.replace("currentColor","#34d399")} Last 14 days</div>
        <div class="chart-box">${svgLineChart([{data: calData, color:"#fb923c"}, {data: proData, color:"#fb7185"}], {labels})}</div>
        <div class="legend">
          <span><span class="dot" style="background:#fb923c;"></span>Calories</span>
          <span><span class="dot" style="background:#fb7185;"></span>Protein (g)</span>
        </div>
      </div>
    `;
  }

  if (state.tab === "settings") {
    html += `
      <div class="sublabel">Body weight unit</div>
      <div class="unit-toggle">
        <button data-unit="kg" class="${s.weightUnit==='kg'?'active':''}">kg</button>
        <button data-unit="lb" class="${s.weightUnit==='lb'?'active':''}">lb</button>
      </div>
      <div style="margin-top:18px;">
        <div class="sublabel">Daily calorie target</div>
        <input type="number" id="cal-target" value="${s.calorieTarget}" />
      </div>
      <div style="margin-top:14px;">
        <div class="sublabel">Daily protein target (g)</div>
        <input type="number" id="pro-target" value="${s.proteinTarget}" />
      </div>
      <p class="note">Targets are based on The Ultimate Guide to Body Recomposition (Nippard & Barakat). Workout plan is Jeff Nippard's Fundamentals Hypertrophy Program. Update your targets here any time your weight or body fat % changes.</p>
      <p class="note">All data is stored only on this device. Clearing your browser data will erase it.</p>
    `;
  }

  html += `</main>
    <nav>
      <button data-tab="nutrition" class="${state.tab==='nutrition'?'active':''}">${ICONS.flame}Nutrition</button>
      <button data-tab="workout" class="${state.tab==='workout'?'active':''}">${ICONS.dumbbell}Workout</button>
      <button data-tab="progress" class="${state.tab==='progress'?'active':''}">${ICONS.trending}Progress</button>
      <button data-tab="settings" class="${state.tab==='settings'?'active':''}">${ICONS.settings}Settings</button>
    </nav>`;

  app.innerHTML = html;
  attachHandlers();
}

function attachHandlers() {
  document.querySelectorAll("nav button[data-tab]").forEach((btn) => {
    btn.onclick = () => { state.tab = btn.dataset.tab; render(); };
  });

  if (state.tab === "nutrition") {
    document.getElementById("cal-input").oninput = (e) => state.nutritionToday.calories = e.target.value;
    document.getElementById("pro-input").oninput = (e) => state.nutritionToday.protein = e.target.value;
    document.getElementById("bw-input").oninput = (e) => state.bodyWeightToday = e.target.value;
    document.getElementById("save-nutrition").onclick = () => {
      store.set(`nutrition:${todayStr()}`, state.nutritionToday);
      flashSaved();
    };
    document.getElementById("bw-save").onclick = () => {
      if (!state.bodyWeightToday) return;
      store.set(`bodyweight:${todayStr()}`, { weight: Number(state.bodyWeightToday) });
      flashSaved();
    };
  }

  if (state.tab === "workout") {
    document.getElementById("split-select").onchange = (e) => {
      state.settings.split = e.target.value; state.dayIndex = 0;
      store.set("settings", state.settings); loadWorkoutLog(); render();
    };
    document.getElementById("week-select").onchange = (e) => {
      state.settings.week = Number(e.target.value);
      store.set("settings", state.settings); loadWorkoutLog(); render();
    };
    document.querySelectorAll(".chip[data-day]").forEach((chip) => {
      chip.onclick = () => { state.dayIndex = Number(chip.dataset.day); loadWorkoutLog(); render(); };
    });
    document.querySelectorAll(".wt-input").forEach((inp) => {
      inp.oninput = (e) => {
        const { ex: exName, set, field } = e.target.dataset;
        state.workoutLog[exName][Number(set)][field] = e.target.value;
      };
    });
    document.querySelectorAll(".video-toggle-btn").forEach((btn) => {
      btn.onclick = () => {
        const name = btn.dataset.videoEx;
        if (state.expandedVideos.has(name)) state.expandedVideos.delete(name);
        else state.expandedVideos.add(name);
        render();
      };
    });
    document.getElementById("save-workout").onclick = () => {
      const phase = phaseForWeek(state.settings.week);
      const dayName = PROGRAMS[state.settings.split].phases[phase][state.dayIndex].day;
      store.set(`workout:${todayStr()}:${state.settings.split}:${dayName}`, state.workoutLog);
      flashSaved();
    };
  }

  if (state.tab === "settings") {
    document.querySelectorAll(".unit-toggle button").forEach((btn) => {
      btn.onclick = () => {
        state.settings.weightUnit = btn.dataset.unit;
        store.set("settings", state.settings); render();
      };
    });
    document.getElementById("cal-target").onchange = (e) => {
      state.settings.calorieTarget = Number(e.target.value); store.set("settings", state.settings);
    };
    document.getElementById("pro-target").onchange = (e) => {
      state.settings.proteinTarget = Number(e.target.value); store.set("settings", state.settings);
    };
  }
}

render();

/* ---------------- PWA install + service worker ---------------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").style.display = "flex";
});
document.getElementById("install-btn").onclick = async () => {
  document.getElementById("install-banner").style.display = "none";
  if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
};
window.addEventListener("appinstalled", () => {
  document.getElementById("install-banner").style.display = "none";
});
</script>
</body>
</html>
